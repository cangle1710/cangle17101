name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dashboard/requirements.txt
          pip install pytest pytest-asyncio pytest-timeout hypothesis

      - name: Run tests
        env:
          # Required by dashboard.app.main module-level create_app(); the
          # real Settings used in tests is built per-test in conftest.py.
          DASHBOARD_API_KEY: ci-placeholder-key-must-be-32-chars-long
          DASHBOARD_BOT_DB_PATH: /tmp/_dashboard_unused.sqlite
        run: |
          pytest -v --tb=short

      - name: Throughput guard
        # Fail if sustained throughput drops below the threshold set in
        # tests/throughput/test_throughput.py.
        run: |
          pytest -v -m throughput --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff check
        run: ruff check bot tests dashboard
