# Polymarket Smart Copy Trading Bot - example config.
#
# All thresholds are tunable here without code changes.
# Secrets (POLYGON_PRIVATE_KEY, CLOB_API_KEY, CLOB_API_SECRET, CLOB_API_PASSPHRASE)
# come from environment variables, never the config file.

tracker:
  # Replace with the wallets you actually want to follow (lowercase hex).
  # Popular public "proxy" wallets for top traders can be sourced from
  # polymarket analytics dashboards.
  wallets:
    - "0x63d43bbb87f85af03b8f2f9e2fad7b54334fa2f1"  # wokerjoesleeper - esports/politics $1k-17k
    - "0x204f72f35326db932158cba6adff0b9a1da95e14"  # sports (soccer/tennis) ~50 trades/day
    - "0xabce9e07e2bad654fc422b5187ad3b91a9a72f87"  # BTC short-term direction trader
  poll_interval_seconds: 2.0
  data_api_base: "https://data-api.polymarket.com"
  max_trade_age_seconds: 30.0

filter:
  max_price_move_pct: 0.04        # reject if market moved >4% past trader entry
  min_liquidity_usdc: 2000.0      # top-of-book size, in USDC
  max_spread_pct: 0.03            # reject if bid/ask spread > 3% of mid
  min_trader_score: 0.50          # 0.5 is the neutral prior for new traders
  min_trade_notional: 50.0
  max_price: 0.97                 # avoid near-certain markets
  min_price: 0.03

sizing:
  kelly_fraction: 0.25
  max_pct_per_trade: 0.03         # 3% of bankroll max per single copy
  max_pct_per_market: 0.08        # 8% of bankroll max in any one market
  min_notional: 10.0
  trader_edge_weight: 0.5
  max_implied_edge: 0.10          # cap edge estimate at ±10 probability points

risk:
  weekly_drawdown_stop_pct: 0.30  # hard halt on -30% week
  daily_soft_stop_pct: 0.10       # no new entries after -10% day
  trader_drawdown_cutoff_pct: 0.20
  trader_consecutive_loss_cutoff: 5
  max_global_exposure_pct: 0.60
  max_open_positions: 25

execution:
  clob_base_url: "https://clob.polymarket.com"
  chain_id: 137                   # Polygon mainnet
  order_ttl_seconds: 15.0         # how long a limit order lives per attempt
  repost_count: 2                 # reposts after the first limit
  repost_step: 0.005              # per-repost nudge toward the opposite side
  max_slippage_pct: 0.015         # abort if effective fill would be >1.5% off
  allow_market_orders: false
  dry_run: true                   # set false once you have a real signer

exit:
  take_profit_pct: 0.30
  stop_loss_pct: 0.12
  mirror_trader_exits: true
  time_exit_hours_before_resolution: 4.0
  poll_interval_seconds: 5.0

bankroll:
  starting_bankroll_usdc: 1000.0
  reserve_pct: 0.10

logging:
  level: "INFO"
  log_file: "logs/bot.log"
  decisions_file: "logs/decisions.jsonl"

data:
  db_path: "state/bot_state.sqlite"

observability:
  enabled: true
  host: "127.0.0.1"
  port: 9090

safety:
  # Operator kill-switch: if this file exists, all new entries are blocked
  # on every check_entry. Leave as empty string to disable.
  kill_switch_file: ""
  # Pause before live trading starts so you can Ctrl+C if dry_run was left
  # off by mistake. Set to 0 to skip.
  live_mode_confirm_delay_seconds: 5.0

scoring:
  # "composite" (ROI + WR + Sharpe + DD penalty) or "bayesian" (Beta
  # posterior LCB on win rate — Thompson-style exploration of new traders).
  mode: "composite"
  bayesian_prior_alpha: 1.0
  bayesian_prior_beta: 1.0
  bayesian_lcb_stdev: 1.0

aggregation:
  # When N>=threshold distinct tracked wallets hit the same market within
  # window_seconds, we emit a decision-journal `signal_cluster` event.
  # Observability-only today; wire your strategy to it.
  cluster_threshold: 2
  cluster_window_seconds: 300.0

adverse_selection:
  # After a fill, sample the book this many seconds later and compare to
  # the fill price. Recorded per-market so you can spot picked-off flow.
  enabled: true
  check_after_seconds: 30.0

# Demo / synthetic-signal mode for end-to-end testing without
# polymarket.com network access. When enabled, the WalletTracker emits
# fake TradeSignals at the configured rate and ClobClient serves
# synthetic order books for the listed token_ids. Combine with
# execution.dry_run=true (the default) for a fully offline pipeline.
blind_copy:
  enabled: false          # set true to skip all filter/sizer/risk logic
  fixed_usdc_per_trade: 10.0  # flat USDC amount to spend on every copied trade

demo:
  enabled: false           # flip to true to run the bot fully offline
  signals_per_minute: 30.0
  sell_probability: 0.20
  # seed: 42                # uncomment for reproducible signal sequences
  wallets:
    - "0xdemo000000000000000000000000000000000001"
    - "0xdemo000000000000000000000000000000000002"
  markets:
    - {market_id: "demo-trump-2028", token_id: "demo-tok-trump-yes", price: 0.42, outcome: "YES", liquidity: 30000}
    - {market_id: "demo-eth-100k",   token_id: "demo-tok-eth-yes",   price: 0.18, outcome: "YES", liquidity: 50000}
    - {market_id: "demo-fed-cut",    token_id: "demo-tok-fed-no",    price: 0.65, outcome: "NO",  liquidity: 20000}
